name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack Moongazing.Veil
        run: dotnet pack src/Moongazing.Veil/Moongazing.Veil.csproj --no-build --configuration Release /p:PackageVersion=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: Pack Moongazing.Veil.AspNetCore
        run: dotnet pack src/Moongazing.Veil.AspNetCore/Moongazing.Veil.AspNetCore.csproj --no-build --configuration Release /p:PackageVersion=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: Pack Moongazing.Veil.Serilog
        run: dotnet pack src/Moongazing.Veil.Serilog/Moongazing.Veil.Serilog.csproj --no-build --configuration Release /p:PackageVersion=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET }} --source https://api.nuget.org/v3/index.json --skip-duplicate
